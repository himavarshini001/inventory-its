<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inventory ITS</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.25rem, 8vw, 5rem);
        font-weight: 800;
        letter-spacing: 0;
      }

      p {
        margin: 0.75rem 0 0;
        color: #4f5b67;
        font-size: 1.125rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>Inventory ITS client is running.</p>
    </main>
  </body>
</html>
